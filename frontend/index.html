<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PlexSort</title>
    <link rel="stylesheet" href="assets/style.css?v=16" />
  </head>
  <body data-view="public">
    <header class="topbar">
      <a class="brand" href="/">
        <span class="brand-name">PlexSort</span>
        <span class="brand-count" id="totalMovies"></span>
      </a>
      <nav class="nav-actions" aria-label="Primary">
        <button class="icon-button sidebar-toggle-btn" id="sidebarToggleButton" type="button" aria-label="Toggle filters" aria-expanded="false">&#9776;</button>
        <a href="/admin.html">Admin</a>
        <button class="icon-button settings-button" id="settingsButton" type="button" title="Health metrics">&#9881;</button>
      </nav>
    </header>

    <main class="app-shell">
      <aside class="sidebar" id="sidebar" aria-label="Movie filters">
        <section class="sidebar-section filter-panel" data-collapsed="false">
          <div class="section-header">
            <span class="section-label">Filters</span>
            <div class="section-actions">
              <button class="text-btn" id="toggleFiltersButton" type="button">Hide</button>
              <button class="text-btn" id="clearFiltersButton" type="button">Clear</button>
            </div>
          </div>

          <div class="filter-fields" id="filterFields">
            <label>
              Search
              <input id="searchInput" type="search" autocomplete="off" />
            </label>

            <div class="field-grid two">
              <label>
                From
                <input id="yearMinInput" type="number" min="1880" max="2100" inputmode="numeric" />
              </label>
              <label>
                To
                <input id="yearMaxInput" type="number" min="1880" max="2100" inputmode="numeric" />
              </label>
            </div>

            <label>
              Genre
              <input id="genreInput" type="text" list="genreOptions" autocomplete="off" />
            </label>

            <label>
              Resolution
              <select id="resolutionSelect">
                <option value="">Any</option>
                <option value="4k">4K</option>
                <option value="1080">1080p</option>
                <option value="720">720p</option>
                <option value="480">480p</option>
                <option value="sd">SD</option>
              </select>
            </label>

            <label>
              Content rating
              <input id="contentRatingInput" type="text" autocomplete="off" />
            </label>

            <div class="field-grid two">
              <label>
                IMDb from
                <input id="minImdbInput" type="number" min="0" max="10" step="0.1" inputmode="decimal" />
              </label>
              <label>
                Metascore from
                <input id="minMetascoreInput" type="number" min="0" max="100" step="1" inputmode="numeric" />
              </label>
            </div>

            <label>
              OMDb rated
              <input id="omdbRatedInput" type="text" autocomplete="off" />
            </label>

            <label>
              Country
              <input id="countryInput" type="text" autocomplete="off" />
            </label>

            <label>
              Language
              <input id="languageInput" type="text" autocomplete="off" />
            </label>

            <fieldset class="segmented" aria-label="Watched status">
              <legend>Watched</legend>
              <label><input type="radio" name="watched" value="" checked /> Any</label>
              <label><input type="radio" name="watched" value="true" /> Yes</label>
              <label><input type="radio" name="watched" value="false" /> No</label>
            </fieldset>
          </div>
        </section>

        <section class="sidebar-section">
          <div class="section-header">
            <span class="section-label">Letterboxd</span>
          </div>
          <label>
            List
            <select id="listSelect">
              <option value="">None loaded</option>
            </select>
          </label>
          <dl class="coverage-list" id="coverageSummary">
            <div><dt>Coverage</dt><dd>--</dd></div>
            <div><dt>In Plex</dt><dd>--</dd></div>
            <div><dt>Missing from Plex</dt><dd>--</dd></div>
            <div><dt>Not in list</dt><dd>--</dd></div>
          </dl>
          <div class="export-links" id="exportLinks" hidden>
            <a id="diffCsvLink" class="text-btn" download>Download update CSV</a>
          </div>
          <div class="export-links">
            <a class="text-btn" href="/api/export/letterboxd-csv" download="plexsort-library.csv">Export full library CSV</a>
          </div>
        </section>
      </aside>

      <section class="workspace" aria-label="Plex movie library">
        <div class="table-toolbar">
          <div>
            <h1>Movies</h1>
            <div class="toolbar-sub">
              <p id="resultCount">Loading</p>
              <a id="exportFilteredLink" class="text-btn" download="plexsort-movies.csv" href="/api/export/movies-csv">Export view</a>
              <a id="exportAllLink" class="text-btn" download="plexsort-movies-all.csv" href="/api/export/movies-csv?columns=all">Export all data</a>
            </div>
          </div>
          <div class="toolbar-actions">
            <button class="ghost-button column-toggle" id="columnToggleButton" type="button" aria-expanded="false">Columns</button>
            <select id="sortSelect" class="sort-select" title="Sort by">
              <option value="title">Title</option>
              <option value="year">Year</option>
              <option value="duration">Duration</option>
              <option value="rating">Critic rating</option>
              <option value="audience_rating">Audience rating</option>
              <option value="imdb_rating">IMDb rating</option>
              <option value="metascore">Metascore</option>
              <option value="released">Released</option>
              <option value="bitrate">Bitrate</option>
              <option value="added_at">Date added</option>
              <option value="view_count">View count</option>
            </select>
            <button class="icon-button" id="sortDirButton" type="button" title="Ascending — click to reverse">↑</button>
            <span class="toolbar-sep" aria-hidden="true"></span>
            <select id="perPageSelect" class="per-page-select" title="Rows per page">
              <option value="25">25</option>
              <option value="50" selected>50</option>
              <option value="100">100</option>
            </select>
            <span class="toolbar-sep" aria-hidden="true"></span>
            <button class="icon-button" id="prevPageButton" type="button" title="Previous page">&#8249;</button>
            <span id="pageLabel">1</span>
            <button class="icon-button" id="nextPageButton" type="button" title="Next page">&#8250;</button>
          </div>
        </div>

        <div class="active-filters" id="activeFilters" hidden></div>

        <div class="column-panel" id="columnPanel" hidden>
          <div class="column-presets" id="columnPresets"></div>
          <div class="column-options" id="columnOptions"></div>
        </div>

        <div class="table-frame" id="tableFrame">
          <table>
            <thead>
              <tr id="moviesHead"></tr>
            </thead>
            <tbody id="moviesBody"></tbody>
          </table>
          <div class="empty-state" id="emptyState" hidden>
            <strong>No movies found</strong>
            <span>Sync Plex from the admin page or adjust your filters.</span>
          </div>
        </div>

        <div class="missing-view" id="missingView" hidden>
          <div class="missing-view-header">
            <strong id="missingViewTitle"></strong>
            <button class="text-btn" id="closeMissingViewButton" type="button">← All films</button>
          </div>
          <div id="missingList"></div>
        </div>
      </section>
    </main>

    <div class="settings-panel" id="settingsPanel" hidden>
      <div class="panel-title">
        <div>
          <h2>Health</h2>
          <p>Library and matching status</p>
        </div>
        <button class="ghost-button" id="closeSettingsButton" type="button">Close</button>
      </div>
      <div class="health-grid" id="healthGrid"></div>
      <div class="health-lists" id="healthLists"></div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

    <div class="movie-detail" id="movieDetail" role="dialog" aria-modal="true" aria-labelledby="detailTitle" hidden>
      <div class="movie-detail-backdrop" id="movieDetailBackdrop"></div>
      <div class="movie-detail-panel">
        <div class="movie-detail-header">
          <button class="icon-button" id="closeMovieDetailButton" type="button" aria-label="Close">✕</button>
        </div>
        <div id="movieDetailContent"></div>
      </div>
    </div>

    <datalist id="genreOptions"></datalist>
    <script src="assets/app.js?v=16"></script>
  </body>
</html>
